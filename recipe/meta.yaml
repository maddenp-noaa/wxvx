{% set info = load_file_data("wxvx/resources/info.json") %}

package:
  name: wxvx
  version: {{ info["version"] }}
source:
  path: ../src
build:
  include_recipe: false
  noarch: python
  number: {{ info["buildnum"] }}
requirements:
  build:
    - pip
    - setuptools
  run:
    - metkit 11.0.*
    - parsl
    - uwtools 2.5.*
    - python >=3.9,<3.13
test:
  requires:
    - black #24.8.*
    - docformatter #1.7.*
    - isort #5.13.*
    - jq #1.7.*
    - make #4.4.*
    - mypy #1.11.*
    - pylint #3.2.*
    - pytest #8.3.*
    - pytest-cov #5.0.*
    - pytest-xdist #3.6.*
about:
  license: APACHE
