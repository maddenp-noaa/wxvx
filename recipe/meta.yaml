{% set info = load_file_data("wxvx/resources/info.json") %}

package:
  name: wxvx
  version: {{ info["version"] }}
source:
  path: ../src
build:
  include_recipe: false
  noarch: python
  number: {{ info["buildnum"] }}
requirements:
  build:
    - pip
    - setuptools
  run:
    - iotaa >=1.1.2
    - metkit 11.0.*
    - netcdf4 1.7.*
    - python 3.10 # due to metkit python_abi pin
    - pyyaml 6.0.*
    - requests 2.32.*
    - uwtools 2.6.*
    - xarray 2023.12.*
    - zarr 2.17.*
test:
  requires:
    - black 24.10.*
    - docformatter 1.7.*
    - isort 5.13.*
    - jq 1.7.*
    - make 4.4.*
    - mypy 1.12.*
    - pyfakefs 5.7.*
    - pylint 3.3.*
    - pytest 8.3.*
    - pytest-cov 6.0.*
    - pytest-xdist 3.6.*
about:
  license: APACHE
